services:
  seafile.notification-server:
    image: ${NOTIFICATION_SERVER_IMAGE:-seafileltd/notification-server:13.0-latest}
    container_name: seafile.notification-server
    restart: always
    volumes:
      - /mnt/storage/application_data/seafile/server/data/seafile/logs:/shared/seafile/logs
    # ports:
    #   - "8083:8083"
    environment:
      - SEAFILE_MYSQL_DB_HOST=seafile.database
      - SEAFILE_MYSQL_DB_PORT=3306
      - SEAFILE_MYSQL_DB_USER=seafile
      - SEAFILE_MYSQL_DB_PASSWORD=${SEAFILE_MYSQL_DB_PASSWORD:?Variable is not set or empty}
      - SEAFILE_MYSQL_DB_CCNET_DB_NAME=ccnet_db
      - SEAFILE_MYSQL_DB_SEAFILE_DB_NAME=seafile_db
      - JWT_PRIVATE_KEY=${JWT_PRIVATE_KEY:?Variable is not set or empty}
      - SEAFILE_LOG_TO_STDOUT=${SEAFILE_LOG_TO_STDOUT:-false}
      - NOTIFICATION_SERVER_LOG_LEVEL=${NOTIFICATION_SERVER_LOG_LEVEL:-info}
    labels:
      # Traefik
      traefik.enable: "true"
      # Traefik, Router
      traefik.http.routers.seafile_notification_server.entrypoints: websecure
      traefik.http.routers.seafile_notification_server.rule: Host(`${SEAFILE_URL_PREFIX:-seafile.}${NETWORK_DOMAIN}`) && PathPrefix(`/notification`)
      traefik.http.routers.seafile_notification_server.tls.certresolver: dns-cloudflare
      # Traefik, Services
      traefik.http.routers.seafile_notification_server.service: seafile_notification_server
      traefik.http.services.seafile_notification_server.loadbalancer.server.port: 8083
    depends_on:
      seafile.database:
        condition: service_healthy
      seafile.server:
        condition: service_healthy
    networks:
      - seafile
      - proxy_private
